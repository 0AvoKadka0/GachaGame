<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Галерея персонажей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #0a1a2a;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a2a3a, #0a121c);
            pointer-events: none;
            z-index: 0;
        }

        .gallery-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 80px 30px 40px;
        }

        .top-bar {
            position: fixed;
            top: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 20;
            pointer-events: none;
        }
        
        .top-left-group {
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }
        
        .back-btn {
            background: radial-gradient(ellipse at 30% 30%, rgba(46, 63, 78, 0.95), rgba(18, 31, 43, 0.95));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 200, 100, 0.6);
            padding: 10px 22px;
            border-radius: 60px;
            color: #FFE2B5;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            background: radial-gradient(ellipse at 30% 30%, rgba(66, 93, 108, 0.95), rgba(28, 45, 58, 0.95));
            border-color: #ffcd7e;
        }

        .gallery-title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .gallery-title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6B0, #D9B48B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .character-card {
            background: linear-gradient(145deg, #1e2a32, #0f1a1f);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 215, 150, 0.3);
            position: relative;
        }
        
        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 215, 150, 0.6);
        }
        
        .character-card.locked {
            filter: brightness(0.6) grayscale(0.3);
            opacity: 0.8;
        }
        
        .character-image {
            width: 100%;
            aspect-ratio: 9 / 16;
            object-fit: cover;
            display: block;
        }
        
        .character-info {
            padding: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
        }
        
        .character-name {
            font-weight: bold;
            font-size: 1rem;
            color: #FFE2B5;
            margin-bottom: 4px;
        }
        
        .character-title {
            font-size: 0.7rem;
            color: #b9cfec;
        }
        
        .rarity-badge {
            display: inline-block;
            margin-top: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .character-card.rarity-UR .rarity-badge {
            color: #ff6b6b;
            border-color: #ff6b6b;
            text-shadow: 0 0 3px rgba(255, 107, 107, 0.5);
        }

        .character-card.rarity-SSR .rarity-badge {
            color: #ffb347;
            border-color: #ffb347;
            text-shadow: 0 0 3px rgba(255, 179, 71, 0.5);
        }

        .character-card.rarity-SR .rarity-badge {
            color: #c98eff;
            border-color: #c98eff;
            text-shadow: 0 0 3px rgba(201, 142, 255, 0.5);
        }

        .character-card.rarity-R .rarity-badge {
            color: #bdc3c7;
            border-color: #bdc3c7;
        }

        .character-card.locked .rarity-badge {
            opacity: 0.7;
            filter: none;
        }
        
        .lock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 5px black;
            pointer-events: none;
            z-index: 2;
        }
        
        .rarity-UR { border-top: 4px solid #FF6B6B; }
        .rarity-SSR { border-top: 4px solid #FFB347; }
        .rarity-SR { border-top: 4px solid #c98eff; }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #FFE2B5;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1000;
            border: 1px solid rgba(255, 215, 150, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast-message.show {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .gallery-container { padding: 70px 20px 30px; }
            .characters-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .character-name { font-size: 0.85rem; }
            .character-title { font-size: 0.6rem; }
            .back-btn { padding: 6px 16px; font-size: 0.75rem; }
            .top-bar { padding: 0 20px; top: 20px; }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <div class="gallery-title">
            <h1 data-i18n="title">✦ ГАЛЕРЕЯ ПЕРСОНАЖЕЙ ✦</h1>
        </div>
        <div id="charactersGrid" class="characters-grid">
            <!-- Карточки будут вставлены через JS -->
        </div>
    </div>

    <div class="top-bar">
        <div class="top-left-group">
            <button class="back-btn" id="backToHubBtn" data-i18n="back_btn">← НАЗАД</button>
        </div>
    </div>

    <div id="toastMessage" class="toast-message"></div>

    <script async src="/sdk.js" onload="initSDK()"></script>
    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        // Уникальный ключ сохранения (без отсылок)
        const STORAGE_KEY = 'avokadka_game_data';

        // Локализация (русский и английский)
        const LOCALE_STRINGS = {
            ru: {
                title: "✦ ГАЛЕРЕЯ ПЕРСОНАЖЕЙ ✦",
                back_btn: "← НАЗАД"
            },
            en: {
                title: "✦ CHARACTER GALLERY ✦",
                back_btn: "← BACK"
            }
        };

        // Список всех персонажей с их редкостями и данными
        const CHARACTERS_CONFIG = {
            UR: [
                { id: "victor", name: "Виктóр", title: "Бессмертный", type: "Персонаж", rarity: "UR", image: "./images/characters/victor.png" }
            ],
            SSR: [
                { id: "elian", name: "Элиан", title: "Хранительница штормов", type: "Персонаж", rarity: "SSR", image: "./images/characters/elian.png" },
                { id: "valor", name: "Валтор", title: "Рыцарь рассвета", type: "Персонаж", rarity: "SSR", image: "./images/characters/valor.png" }
            ],
            SR: [
                { id: "silva", name: "Сильва", title: "Лесная лучница", type: "Персонаж", rarity: "SR", image: "./images/characters/silva.png" },
                { id: "brun", name: "Брун", title: "Кузнец-воин", type: "Персонаж", rarity: "SR", image: "./images/characters/brun.png" }
            ],
            R: [
                { id: "guard_low", name: "Лоу", title: "Охранник городских ворот", type: "Персонаж", rarity: "R", image: "./images/characters/guard_low.png" }
            ]
        };

        let allCharacters = [];
        for (let rarity in CHARACTERS_CONFIG) {
            allCharacters.push(...CHARACTERS_CONFIG[rarity]);
        }

        let collectedIds = [];
        let ysdk = null;
        let currentLocale = 'ru';

        // ========== ИНИЦИАЛИЗАЦИЯ SDK ==========
        async function initSDK() {
            try {
                ysdk = await YaGames.init();
                const lang = ysdk.environment.i18n.lang;
                if (lang && LOCALE_STRINGS[lang]) currentLocale = lang;
                else currentLocale = 'ru';
                applyLocale(currentLocale);
                ysdk.features.LoadingAPI?.ready();
            } catch(e) {
                console.warn('SDK init failed:', e);
            }
            loadCollectedCharacters();
            renderGallery();
        }

        function applyLocale(locale) {
            const strings = LOCALE_STRINGS[locale] || LOCALE_STRINGS.ru;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (strings[key] !== undefined) el.innerHTML = strings[key];
            });
        }

        // ========== РАБОТА С ДАННЫМИ ==========
        function loadCollectedCharacters() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    collectedIds = data.collectedCharacters || [];
                } catch(e) {}
            }
        }

        // Функция для обновления данных после импорта/сброса (вызывается из index)
        function refreshData() {
            loadCollectedCharacters();
            renderGallery();
        }

        // Сохраняем изменения (если нужно вызвать из вне)
        function saveAndSync() {
            // В этой странице мы только читаем данные, но если потребуется запись, можно добавить вызов window.saveToCloud()
            if (typeof window.saveToCloud === 'function') {
                window.saveToCloud();
            }
        }

        // ========== ОТРИСОВКА ГАЛЕРЕИ ==========
        function renderGallery() {
            const grid = document.getElementById('charactersGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            // Сортируем по редкости: UR, SSR, SR, R
            const order = { UR: 0, SSR: 1, SR: 2, R: 3 };
            const sorted = [...allCharacters].sort((a, b) => order[a.rarity] - order[b.rarity]);
            
            for (let char of sorted) {
                const isOwned = collectedIds.includes(char.id);
                const card = document.createElement('div');
                card.className = `character-card ${!isOwned ? 'locked' : ''} rarity-${char.rarity}`;
                
                card.innerHTML = `
                    <img src="${char.image}" class="character-image" alt="${char.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 711'%3E%3Crect width='400' height='711' fill='%23333'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23FFE2B5'%3E%3C/text%3E%3C/svg%3E'">
                    <div class="character-info">
                        <div class="character-name">${char.name}</div>
                        <div class="character-title">${char.title || ''}</div>
                        <div class="rarity-badge">${char.rarity}</div>
                    </div>
                    ${!isOwned ? '<div class="lock-overlay">🔒</div>' : ''}
                `;
                grid.appendChild(card);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(100, 50, 50, 0.95)' : 'rgba(0, 0, 0, 0.85)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ========== ОБРАБОТЧИКИ ==========
        document.getElementById('backToHubBtn').addEventListener('click', () => {
            // При возврате сохраняем прогресс (если нужно) – но данные не менялись
            if (typeof window.saveToCloud === 'function') window.saveToCloud();
            window.location.href = "index.html";
        });

        // Подписываемся на событие обновления данных (если данные изменятся в другом окне, можно перерисовать)
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                refreshData();
            }
        });

        // Экспортируем функцию для обновления из других страниц
        window.refreshCharacterGallery = refreshData;

        // Запуск
        // Данные загрузятся после инициализации SDK, но можно сразу подгрузить и отрисовать
        loadCollectedCharacters();
        renderGallery();
    </script>
</body>
</html>
