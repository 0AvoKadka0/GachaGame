<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Галерея оружия | Genshin Impact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?w=1920&h=1080&fit=crop') center/cover no-repeat fixed;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            pointer-events: none;
            z-index: 0;
        }

        .gallery-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 80px 30px 40px;
        }

        .top-bar {
            position: fixed;
            top: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 20;
            pointer-events: none;
        }
        
        .top-left-group {
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }
        
        .back-btn {
            background: radial-gradient(ellipse at 30% 30%, rgba(46, 63, 78, 0.95), rgba(18, 31, 43, 0.95));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 200, 100, 0.6);
            padding: 10px 22px;
            border-radius: 60px;
            color: #FFE2B5;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            background: radial-gradient(ellipse at 30% 30%, rgba(66, 93, 108, 0.95), rgba(28, 45, 58, 0.95));
            border-color: #ffcd7e;
        }

        .gallery-title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .gallery-title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6B0, #D9B48B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .weapons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .weapon-card {
            background: linear-gradient(145deg, #1e2a32, #0f1a1f);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 215, 150, 0.3);
            position: relative;
        }
        
        .weapon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 215, 150, 0.6);
        }
        
        .weapon-card.locked {
            filter: brightness(0.6) grayscale(0.3);
            opacity: 0.8;
        }
        
        .weapon-image {
            width: 100%;
            aspect-ratio: 9 / 16;
            object-fit: cover;
            display: block;
        }
        
        .weapon-info {
            padding: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
        }
        
        .weapon-name {
            font-weight: bold;
            font-size: 1rem;
            color: #FFE2B5;
            margin-bottom: 4px;
        }
        
        .weapon-title {
            font-size: 0.7rem;
            color: #b9cfec;
        }
        
        .rarity-badge {
            display: inline-block;
            margin-top: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.5);
        }
        
        .lock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 5px black;
            pointer-events: none;
            z-index: 2;
        }
        
        .rarity-UR { border-top: 4px solid #FF6B6B; }
        .rarity-SSR { border-top: 4px solid #FFB347; }
        .rarity-SR { border-top: 4px solid #c98eff; }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #FFE2B5;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1000;
            border: 1px solid rgba(255, 215, 150, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast-message.show {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .gallery-container { padding: 70px 20px 30px; }
            .weapons-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .weapon-name { font-size: 0.85rem; }
            .weapon-title { font-size: 0.6rem; }
            .back-btn { padding: 6px 16px; font-size: 0.75rem; }
            .top-bar { padding: 0 20px; top: 20px; }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <div class="gallery-title">
            <h1>✦ ГАЛЕРЕЯ ОРУЖИЯ ✦</h1>
        </div>
        <div id="weaponsGrid" class="weapons-grid">
            <!-- Карточки оружия будут вставлены через JS -->
        </div>
    </div>

    <div class="top-bar">
        <div class="top-left-group">
            <button class="back-btn" id="backToHubBtn">← НАЗАД</button>
        </div>
    </div>

    <div id="toastMessage" class="toast-message"></div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ОРУЖИЯ ====================
        // Дублируем структуру из баннера, но только оружие
        // При добавлении нового оружия нужно добавить его сюда с полями id, name, title, type, image, rarity
        const WEAPONS_CONFIG = {
            UR: [
                { id: "divine_sword", name: "Божественный меч", title: "Клинок бесконечности", type: "Оружие", rarity: "UR", image: "https://picsum.photos/id/105/400/711" },
                { id: "eternal_bow", name: "Вечный лук", title: "Стрела судьбы", type: "Оружие", rarity: "UR", image: "https://picsum.photos/id/107/400/711" },
                { id: "primordial_spear", name: "Изначальное копьё", title: "Копьё первородного", type: "Оружие", rarity: "UR", image: "https://picsum.photos/id/109/400/711" }
            ],
            SSR: [
                { id: "skyward_spine", name: "Небесная ось", title: "Копьё возмездия", type: "Оружие", rarity: "SSR", image: "https://picsum.photos/id/114/400/711" },
                { id: "aquila_favonia", name: "Аквила Фавония", title: "Меч", type: "Оружие", rarity: "SSR", image: "https://picsum.photos/id/115/400/711" },
                { id: "wolfs_gravestone", name: "Волчья погибель", title: "Двуручный меч", type: "Оружие", rarity: "SSR", image: "https://picsum.photos/id/118/400/711" },
                { id: "lost_prayer", name: "Утерянная молитва", title: "Катализатор", type: "Оружие", rarity: "SSR", image: "https://picsum.photos/id/119/400/711" }
            ],
            SR: [
                { id: "sacrificial_sword", name: "Меч Сакрального льда", type: "Оружие", rarity: "SR", image: "https://picsum.photos/id/132/400/711" },
                { id: "favonius_bow", name: "Лук-ловец ветра", type: "Оружие", rarity: "SR", image: "https://picsum.photos/id/134/400/711" },
                { id: "dragons_tale", name: "Гримуар драконьих сказаний", type: "Оружие", rarity: "SR", image: "https://picsum.photos/id/136/400/711" },
                { id: "ritual_sword", name: "Ритуальный меч", type: "Оружие", rarity: "SR", image: "https://picsum.photos/id/138/400/711" }
            ]
        };

        let allWeapons = [];
        for (let rarity in WEAPONS_CONFIG) {
            allWeapons.push(...WEAPONS_CONFIG[rarity]);
        }

        const STORAGE_KEY = 'genshin_game_data';
        let collectedWeaponIds = [];

        function loadCollectedWeapons() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    collectedWeaponIds = data.collectedWeapons || [];
                } catch(e) {}
            }
        }

        function renderGallery() {
            const grid = document.getElementById('weaponsGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            const order = { UR: 0, SSR: 1, SR: 2 };
            const sorted = [...allWeapons].sort((a, b) => order[a.rarity] - order[b.rarity]);
            
            for (let weapon of sorted) {
                const isOwned = collectedWeaponIds.includes(weapon.id);
                const card = document.createElement('div');
                card.className = `weapon-card ${!isOwned ? 'locked' : ''} rarity-${weapon.rarity}`;
                
                card.innerHTML = `
                    <img src="${weapon.image}" class="weapon-image" alt="${weapon.name}" onerror="this.src='https://picsum.photos/id/1/400/711'">
                    <div class="weapon-info">
                        <div class="weapon-name">${weapon.name}</div>
                        <div class="weapon-title">${weapon.title || ''}</div>
                        <div class="rarity-badge">${weapon.rarity}</div>
                    </div>
                    ${!isOwned ? '<div class="lock-overlay">🔒</div>' : ''}
                `;
                grid.appendChild(card);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(100, 50, 50, 0.95)' : 'rgba(0, 0, 0, 0.85)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        document.getElementById('backToHubBtn').addEventListener('click', () => {
            window.location.href = "index.html";
        });

        // Функция обновления галереи (загружает данные и перерисовывает)
function refreshGallery() {
    loadCollectedWeapons();
    renderGallery();
}

// При загрузке страницы
window.addEventListener('load', refreshGallery);
// При показе страницы (если она была в кэше браузера)
window.addEventListener('pageshow', refreshGallery);
    </script>
</body>
</html>
